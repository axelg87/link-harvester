<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Link Harvester</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LinkHarvester.Web.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <div class="lh-boot">
            <div class="lh-boot-spinner"></div>
            <div class="lh-boot-text">Loading…</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        // Link Harvester is a private, frequently deployed dashboard. Disable
        // the Blazor offline/PWA service worker so new deploys never keep an
        // old WASM bundle alive in the browser.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
                .then(registrations => registrations.forEach(registration => registration.unregister()));
        }
        if ('caches' in window) {
            caches.keys().then(keys => keys.forEach(key => caches.delete(key)));
        }
    </script>
    <script>
        // Cmd/Ctrl+K → focus the top search bar from anywhere.
        // The Blazor component registers itself by calling lhSearchInit with
        // a DotNetObjectReference; we keep a singleton so a quick-K from a
        // page with no search bar in scope is a no-op.
        let __lhSearchRef = null;
        window.lhSearchInit = (ref) => { __lhSearchRef = ref; };
        window.addEventListener('keydown', (e) => {
            const isCmdK = (e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K');
            if (!isCmdK) return;
            e.preventDefault();
            if (__lhSearchRef) __lhSearchRef.invokeMethodAsync('FocusFromHotkey');
        });
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
