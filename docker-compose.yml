services:
  linkharvester:
    build: .
    image: linkharvester:local
    container_name: linkharvester
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    # All app settings (login, NAS credentials, hoster priority, scan
    # interval) are configured from the in-app Settings page and stored
    # encrypted in /app/data. No env vars needed.
