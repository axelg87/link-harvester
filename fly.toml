# Fly.io application config for Link Harvester.
# Single instance, single small VM. SQLite + DataProtection key ring live on
# a persistent volume so settings + catalog + scan history survive restarts.

app = "link-harvester"
primary_region = "bom"  # Mumbai — closest Fly region to the user's UAE NAS.

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_URLS = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"
  DOTNET_RUNNING_IN_CONTAINER = "true"
  # Use the persistent volume mount as the data directory.
  Persistence__DbPath = "/data/linkharvester.db"

[[mounts]]
  source = "harvester_data"
  destination = "/data"
  initial_size = "3gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"        # background scheduler + enricher + ingestor must keep running
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 500

# Custom application-level health check. /healthz validates that the SQLite
# connection is live (SELECT 1) and that the in-memory settings snapshot is
# populated (DataProtection key ring loaded). The endpoint enforces a hard
# 2-second budget internally.
#
# WAL mode lets the SELECT 1 complete during a catalog ingestion's writer
# transaction, so the probe is safe even mid-import. A 60-second grace
# period absorbs cold-start migration time, and 3 consecutive failures
# (≈90 s of badness) trigger a Fly machine restart.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/healthz"
  protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
  # 2 GB gives generous headroom for the ingestor's prepared-statement caches,
  # in-memory titleIds dictionary (~200k entries), and EF Core's tracking
  # during enrichment, all of which run concurrently with ZT scans.
